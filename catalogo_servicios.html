function unico(campo) {
  return [...new Set(DATA.map(s => s[campo]).filter(Boolean))].sort();
}
function llenarSelect(id, campo) {
  const el = document.getElementById(id);
  unico(campo).forEach(v => {
    const opt = document.createElement('option');
    opt.value = v; opt.textContent = v;
    el.appendChild(opt);
  });
}
llenarSelect('f-subsistema','Subsistema');
llenarSelect('f-fuente','FuenteAutentica');
llenarSelect('f-protocolo','Protocolo');

function render() {
  const q = document.getElementById('q').value.trim().toLowerCase();
  const subsistema = document.getElementById('f-subsistema').value;
  const fuente     = document.getElementById('f-fuente').value;
  const protocolo  = document.getElementById('f-protocolo').value;

  const filtrados = DATA.filter(s => {
    if (subsistema && s.Subsistema !== subsistema) return false;
    if (fuente && s.FuenteAutentica !== fuente) return false;
    if (protocolo && s.Protocolo !== protocolo) return false;
    if (q) {
      const hay = ['NombreServicio','Subsistema','FuenteAutentica','Endpoint','Descripcion','Protocolo','Documentacion']
        .some(f => (s[f]||'').toLowerCase().includes(q));
      if (!hay) return false;
    }
    return true;
  });

  const tbody = document.getElementById('rows');
  tbody.innerHTML = '';
  filtrados.forEach(s => {
    const tr = document.createElement('tr');

    const tdNombre = document.createElement('td');
    tdNombre.className = 'col-nombre';
    const nombre = document.createElement('span');
    nombre.className = 'nombre';
    nombre.textContent = s.NombreServicio || '—';
    tdNombre.appendChild(nombre);
    if (s.Descripcion) {
      const desc = document.createElement('div');
      desc.className = 'desc';
      desc.textContent = s.Descripcion;
      tdNombre.appendChild(desc);
    }
    if (s.Endpoint) {
      const ep = document.createElement('div');
      ep.className = 'endpoint';
      ep.textContent = s.Endpoint;
      tdNombre.appendChild(ep);
    }
    if (s.Documentacion) {
      if (s.DocExiste) {
        const a = document.createElement('a');
        a.className = 'doc-link';
        a.href = 'Documentos/' + encodeURIComponent(s.Documentacion);
        a.target = '_blank';
        a.rel = 'noopener';
        const icon = document.createElement('span');
        icon.className = 'material-symbols-rounded';
        icon.textContent = 'description';
        a.appendChild(icon);
        a.appendChild(document.createTextNode(s.Documentacion));
        tdNombre.appendChild(a);
      } else {
        const span = document.createElement('span');
        span.className = 'doc-link doc-link-missing';
        span.title = 'Esa documentación no existe';
        const icon = document.createElement('span');
        icon.className = 'material-symbols-rounded';
        icon.textContent = 'error';
        span.appendChild(icon);
        span.appendChild(document.createTextNode('Documentación no disponible'));
        tdNombre.appendChild(span);
      }
    }
    tr.appendChild(tdNombre);

    const celda = (texto, cls) => {
      const td = document.createElement('td');
      if (cls) td.className = cls;
      td.textContent = texto || '—';
      return td;
    };
    tr.appendChild(celda(s.Subsistema, 'col-sub'));
    tr.appendChild(celda(s.FuenteAutentica, 'col-fuente'));

    const tdProto = document.createElement('td');
    tdProto.className = 'col-proto';
    if (s.Protocolo) { const b = document.createElement('span'); b.className='badge'; b.textContent=s.Protocolo; tdProto.appendChild(b); }
    else { tdProto.textContent = '—'; }
    tr.appendChild(tdProto);

    tbody.appendChild(tr);
  });

  document.getElementById('count').textContent = `${filtrados.length} de ${DATA.length} servicios`;
  document.getElementById('empty').style.display     = filtrados.length === 0 ? '' : 'none';
  document.getElementById('table-wrap').style.display = filtrados.length === 0 ? 'none' : '';
}

['q','f-subsistema','f-fuente','f-protocolo'].forEach(id => {
  document.getElementById(id).addEventListener('input', render);
  document.getElementById(id).addEventListener('change', render);
});
render();
</script>
